      - "Mathlib.FieldTheory.SplittingField.Construction"

  - afp_import: "Matrix_Tensor.Tensor_Product"
    lean4_imports:
      - "Mathlib.LinearAlgebra.Matrix.Kronecker"

  - afp_import: "VectorSpace (AFP HOL)"
    lean4_imports:
      - "Mathlib.LinearAlgebra.Basis"
      - "Mathlib.LinearAlgebra.Span"

  - afp_import: "HOL-Analysis.Inner_Product"
    lean4_imports:
