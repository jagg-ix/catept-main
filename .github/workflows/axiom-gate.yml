name: Axiom Gate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  axiom-check:
    name: Lean 4 Axiom Surface Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Lean 4 toolchain
      uses: leanprover/lean4-action@v1
      with:
        use-mathlib-cache: true

    - name: Warm Mathlib olean cache
      run: lake exe cache get || true

    - name: Build NavierStokesClean core
      run: lake build NavierStokesClean.Core.Types NavierStokesClean.Core.EnergyFunctionals

    - name: Check axiom surface — Route 6 (NS strategy)
      run: |
        cat > /tmp/check_axioms.lean << 'EOF'
        import NavierStokes.GalerkinDescentTower
        import NavierStokes.PopkovZenoBridge

        -- Permitted axioms: propext, Classical.choice, Quot.sound only.
        -- Any new axiom here is a regression and must be reviewed.
        #print axioms strategy_d_popkov_route
        EOF
        lake env lean /tmp/check_axioms.lean 2>&1 | tee /tmp/axiom_output.txt
        # Fail if any axiom beyond the three standard Lean kernel axioms appears
        if grep -v -E "propext|Classical\.choice|Quot\.sound|^#print|^'strategy_d_popkov_route' depends on axioms:" /tmp/axiom_output.txt | grep -q "axiom"; then
          echo "REGRESSION: unexpected axiom detected"
          cat /tmp/axiom_output.txt
          exit 1
        fi
        echo "Axiom surface OK"
        cat /tmp/axiom_output.txt

    - name: Check axiom surface — publication bridges (CATEPT.Bridges.*)
      run: |
        cat > /tmp/check_bridges.lean << 'EOF'
        import CATEPT.Bridges.Pphi2N
        import CATEPT.Bridges.QFT
        import CATEPT.Bridges.GR
        import CATEPT.Bridges.Gravitas
        import CATEPT.Bridges.OSReconstruction

        -- Publication bridge theorems must depend on ONLY the three
        -- Lean kernel axioms: propext, Classical.choice, Quot.sound.
        #print axioms CATEPT.Bridges.Pphi2N.tauEnt_eq_div
        #print axioms CATEPT.Bridges.Pphi2N.tauEnt_nonneg
        #print axioms CATEPT.Bridges.Pphi2N.tauEnt_linear
        #print axioms CATEPT.Bridges.QFT.tauEnt_eq_div
        #print axioms CATEPT.Bridges.QFT.tauEnt_nonneg
        #print axioms CATEPT.Bridges.QFT.damping_abs_le_one
        #print axioms CATEPT.Bridges.QFT.kinetic_pos
        #print axioms CATEPT.Bridges.QFT.propagator_pos
        #print axioms CATEPT.Bridges.GR.schwarzschild_f_pos
        #print axioms CATEPT.Bridges.GR.bh_entropy_pos
        #print axioms CATEPT.Bridges.GR.tauEnt_eq_div
        #print axioms CATEPT.Bridges.GR.tauEnt_nonneg
        #print axioms CATEPT.Bridges.GR.unruh_temperature_pos
        #print axioms CATEPT.Bridges.Gravitas.bh_entropy_pos
        #print axioms CATEPT.Bridges.Gravitas.bh_entropy_ratio
        #print axioms CATEPT.Bridges.Gravitas.bh_entropy_doubling
        #print axioms CATEPT.Bridges.Gravitas.catept_gravitas_coherence
        #print axioms CATEPT.Bridges.OSReconstruction.minkowski_signature_coincides
        #print axioms CATEPT.Bridges.OSReconstruction.is_lorentz_matrix_coincides
        #print axioms CATEPT.Bridges.OSReconstruction.spacelike_condition_coincides
        EOF
        lake env lean /tmp/check_bridges.lean 2>&1 | tee /tmp/bridges_output.txt
        if grep -v -E "propext|Classical\.choice|Quot\.sound|^#print|depends on axioms:|^$" /tmp/bridges_output.txt | grep -qE "axiom|sorryAx"; then
          echo "REGRESSION: non-kernel axiom or sorry in publication bridge surface"
          cat /tmp/bridges_output.txt
          exit 1
        fi
        echo "Publication bridge surface OK (17 theorems, kernel-only axioms)"

    - name: Check axiom surface — QM+GR unification showcase
      run: |
        cat > /tmp/check_showcase.lean << 'EOF'
        import CATEPT.Showcase.QMGRUnification

        -- The headline reviewer-facing claim that CAT/EPT admits QM and GR
        -- as instances of one plugin architecture must depend on ONLY the
        -- three Lean kernel axioms. Any other axiom here is a regression
        -- and invalidates the publication claim.
        #print axioms CATEPT.Showcase.QMGRUnification.qm_satisfies_catept_spine
        #print axioms CATEPT.Showcase.QMGRUnification.gr_minkowski_satisfies_catept_spine
        #print axioms CATEPT.Showcase.QMGRUnification.gr_electrovacuum_satisfies_catept_spine
        #print axioms CATEPT.Showcase.QMGRUnification.qm_gr_unified_via_entropic_proper_time
        EOF
        lake env lean /tmp/check_showcase.lean 2>&1 | tee /tmp/showcase_output.txt
        if grep -v -E "propext|Classical\.choice|Quot\.sound|^#print|depends on axioms:|^$" /tmp/showcase_output.txt | grep -qE "axiom|sorryAx"; then
          echo "REGRESSION: non-kernel axiom or sorry in QM+GR unification showcase"
          cat /tmp/showcase_output.txt
          exit 1
        fi
        echo "QM+GR unification showcase OK (4 theorems, kernel-only axioms)"

    - name: Check sorry count — NavierStokesClean (must not regress)
      run: |
        COUNT=$(grep -r "\bsorry\b" NavierStokesClean/ --include="*.lean" \
          --exclude-dir=PVSLib | grep -v "^.*--.*sorry" | wc -l)
        echo "NavierStokesClean sorry count: $COUNT"
        # Gate: warn if count exceeds baseline (edit threshold as proofs land)
        if [ "$COUNT" -gt 20 ]; then
          echo "WARNING: sorry count $COUNT exceeds threshold 20 in NavierStokesClean"
        fi

    - name: Check sorry count — CATEPT core (must be 0)
      run: |
        COUNT=$(grep -r "\bsorry\b" CATEPT/CATEPT/Foundations.lean \
          NavierStokesClean/Core/ --include="*.lean" \
          | grep -v "^.*--.*sorry" | wc -l)
        echo "CATEPT core sorry count: $COUNT"
        if [ "$COUNT" -gt 0 ]; then
          echo "FAIL: CATEPT core must have 0 sorry (found $COUNT)"
          grep -rn "\bsorry\b" CATEPT/CATEPT/Foundations.lean NavierStokesClean/Core/ \
            --include="*.lean" | grep -v "^.*--.*sorry"
          exit 1
        fi
        echo "CATEPT core: 0 sorry OK"
