name: paraview
upstream_url: https://gitlab.kitware.com/paraview/paraview.git
upstream_ref: master
pip_package: paraview          # Python API only (limited); full app is binary
binary_download: https://www.paraview.org/download/   # full GUI binary
imported_at_utc: 2026-03-08T00:00:00Z
import_method: external_clone
role: pyansys_ui
catept_usage:
  - Post-process OpenFOAM case directories (velocity, pressure, temperature fields)
  - Read MAPDL .rst result files via ANSYS reader plugin
  - Read Fluent .cas/.dat files for CFD post-processing
  - Visualize MEEP HDF5/VTK field outputs (E, H, B fields)
  - Animate tau_ent field time evolution from VTK series
  - Generate publication-quality field renders and slice plots
pyansys_integration:
  - PyMAPDL: export mapdl.result → VTK/RST → ParaView
  - PyFluent: export case → .cas/.dat → ParaView ANSYS Fluent reader
  - OpenFOAM: native ParaView reader (paraFoam) for all OpenFOAM cases
  - MEEP: HDF5 field output → ParaView HDF5 reader + threshold filters
file_formats_read:
  - OpenFOAM case directories (foam:// reader)
  - ANSYS RST / CDB / DAT
  - VTK / VTU / VTS / VTP / PVTU
  - HDF5 (MEEP output)
  - Exodus II, Nastran BDF, STL, CSV
example_usage_pvpython: |
  # pvpython script — run with: pvpython postprocess_openfoam.py
  from paraview.simple import *

  case = OpenFOAMReader(FileName='multiphysics/external/openfoam/case/case.foam')
  case.MeshRegions = ['internalMesh']
  Show(case)
  ColorBy(GetDisplayProperties(case), ('POINTS', 'T'))
  Render()
  SaveScreenshot('temperature_field.png')
gui_type: Qt-based desktop (full ParaView binary)
notes:
  - ParaView source compilation is very heavy (~30 min). Use binary distribution for development.
  - pvpython (bundled in binary) provides batch scripting without ANSYS licenses.
  - paraview Python package on PyPI is limited; use the bundled pvpython from binary install.
  - The source mirror here is for reference/patch tracking; use binary for actual work.
