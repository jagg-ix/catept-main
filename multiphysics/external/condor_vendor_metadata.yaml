name: condor
upstream_url: https://github.com/nasa/condor.git
upstream_ref: main
pip_package: condor-framework   # pip install condor-framework
imported_at_utc: 2026-03-08T00:00:00Z
import_method: external_clone
role: declarative_modeling       # mathematical modeling layer for physics bridges
license: NASA Open Source Agreement v1.3 (NOSA-1.3)
version_stable: "2024-12"        # published JOSS 8859, Dec 2024
stars: ~300
language: Python 3.9+
key_dependencies:
  - casadi>=3.7.2                # CasADi symbolic math / AD backend (required)
  - numpy
  - scipy                        # alternative optimisation backend
  - ndsplines                    # trajectory interpolation
  - matplotlib                   # visualisation (examples only)

overview: |
  NASA Ames Research Center declarative mathematical modelling framework.
  Provides five model archetypes — ExplicitSystem, AlgebraicSystem,
  OptimizationProblem, ODESystem, ExternalSolverWrapper — built via
  Python metaclasses so that user code reads like mathematical notation.
  CasADi (MX symbolic backend) provides automatic differentiation; IPOPT
  via CasADi solves constrained optimisation problems.

  Key capability for CAT/EPT: any Condor model exposes a uniform
  field→element→symbol graph that can be serialised to JSON Schema and
  mapped directly to DTL QTMProfile / DTLContract structures.

architecture_summary:
  model_archetypes:
    ExplicitSystem:    "output = f(input)   — pure mapping, no solve"
    AlgebraicSystem:   "residual(y == f(x, y)) — Newton/rootfinder solve"
    OptimizationProblem: "min f(x) s.t. g(x) ∈ [lb, ub] — IPOPT/SNOPT"
    ODESystem:         "ẋ = f(t, x, p) — Sweeping Gradient Method integration"
    ExternalSolverWrapper: "wrap any external function as a Condor model"

  field_system:
    FreeField:         "Input parameters — user-provided or symbolic"
    AssignedField:     "Outputs assigned via = or relational == syntax"
    InitializedField:  "Variables with initialiser (for solving)"
    BoundedAssignmentField: "Constraints with lb/ub enforcement"
    WithDefaultField:  "Parameters with default values"

  backend:
    symbolic: CasADi MX           # all expressions are CasADi symbolic graphs
    autodiff: CasADi AD           # Jacobians / Hessians computed for free
    solvers:  [IPOPT, Newton+line-search, Scipy.minimize, SGM-ODE]
    swappable: true                # backend/ subpackage design supports Jax, Aesara

dtl_integration_plan:

  # ── Phase 1: CondorPlugin adapter ──────────────────────────────────────────
  phase1_condor_plugin_adapter:
    effort_weeks: 1-2
    risk: low
    description: |
      New file: multiphysics/integration/condor_plugin_adapter.py

      class CondorPlugin(BaseMultiphysicsPlugin):
          """Wraps any Condor model class as a DTL-compatible MultiphysicsPlugin.

          Auto-derives:
            - JSON Schema from Condor FreeField/WithDefaultField elements
              (shape → type array/number, lower/upper_bound → minimum/maximum,
               WithDefault → default, required = fields without default)
            - output_keys from AssignedField / InitializedField element names
            - MCP tool name from model class name (snake_case)
            - MCP description from model class docstring

          Adds:
            - tau_ent post-processing hook (pluggable function mapping
              Condor output dict → {"tau_ent_next", "delta_s_i", "lambda_eff"})
            - DTLContract wired to matching IntegrationSpec in _REGISTRY
            - eBPF tracepoints via TraceEmitter (inherited from BaseMultiphysicsPlugin)
          """

      Usage (plugin author side — zero boilerplate):

          import condor as co
          from multiphysics.integration.condor_plugin_adapter import CondorPlugin

          class ThermalEquilibrium(co.AlgebraicSystem):
              """Steady-state heat equation for water phantom."""
              dose_gy         = co.parameter()
              temp_ambient_k  = co.parameter(initializer=310.0)
              temp_max_k      = co.variable(initializer=311.0)
              co.residual(temp_max_k == temp_ambient_k + 2.5 * dose_gy)

          condor_thermal_plugin = CondorPlugin(
              model_class      = ThermalEquilibrium,
              plugin_id        = "condor_thermal_equilibrium",
              integration_id   = "condor_mapdl_thermal",
              scale_id         = "thermal_fem",
              tau_ent_hook     = catept_thermal_tau_ent,   # maps Condor→DTL keys
          )

      CondorPlugin.run(**kwargs):
          1. Validate kwargs against auto-derived JSON Schema
          2. Instantiate Condor model: instance = ThermalEquilibrium(**kwargs)
          3. Run Condor solve  (Newton / IPOPT / SGM depending on model type)
          4. Extract output fields → dict
          5. Apply tau_ent_hook → {tau_ent_next, delta_s_i, lambda_eff, ...}
          6. Validate against DTLContract
          7. Return result dict

    target_files:
      - multiphysics/integration/condor_plugin_adapter.py   (new)
      - multiphysics/integration/plugins/condor_plugins.py  (new, auto-registers)

  # ── Phase 2: Condor-native equilibrium bridges ──────────────────────────────
  phase2_condor_native_bridges:
    effort_weeks: 2-3
    risk: low
    description: |
      Rewrite three existing analytical bridges as Condor AlgebraicSystems:

        CondorMAPDLThermal   (replaces analytical path in pyansys_entropic_bridge)
        CondorFluentCFD      (steady-state convection residual)
        CondorMaxwellEM      (Biot-Savart residual for solenoid B-field)

      Benefit 1 — Jacobians for free:
        Condor/CasADi auto-differentiates the residual.
        dT_max/d(dose_gy), dB_max/d(coil_current) etc. available without
        finite-difference; useful for tau_ent sensitivity analysis.

      Benefit 2 — warm-starting:
        Condor Newton solver warm-starts from previous solution; consecutive
        calls (e.g. dose sweep) converge in 1-2 iterations after the first.

      Benefit 3 — constraint enforcement:
        Bounds like T_max >= T_ambient become Condor constraint() declarations
        verified algebraically — no manual assert in bridge code.

      Example:
          class CondorMAPDLThermal(co.AlgebraicSystem):
              dose_gy          = co.parameter()
              material         = co.parameter()          # string → lookup table
              geometry_cm      = co.parameter(initializer=10.0)
              temp_ambient_k   = co.parameter(initializer=310.0)
              temp_max_k       = co.variable(initializer=311.0)
              thermal_stress   = co.variable(initializer=0.0)
              co.residual(temp_max_k == _heat_eq(dose_gy, geometry_cm))
              co.residual(thermal_stress == _stress_eq(temp_max_k, temp_ambient_k))

    target_files:
      - multiphysics/integration/condor_bridges.py   (new)

  # ── Phase 3: τ_ent ODE via Condor ODESystem ─────────────────────────────────
  phase3_tau_ent_ode:
    effort_weeks: 3-4
    risk: medium
    description: |
      Express the CAT/EPT entropic time evolution as a Condor ODESystem:

          class EntropicTimeODE(co.ODESystem):
              t        = co.independent_variable()
              tau_ent  = co.state(initializer=0.0)
              lambda_s = co.input()       # scale-dependent decay rate
              ds_i     = co.output(assignment=lambda_s * tau_ent)
              co.dot(tau_ent, -lambda_s * tau_ent)  # dτ/dt = -λ·τ

          phase = EntropicTimeODE.TrajectoryAnalysis(
              time_initial = 0.0,
              time_final   = T_total,
              num_segments = n_steps,
          )
          result = phase(lambda_s=lambda_rate_schedule)

      Benefit — SGM trajectory optimisation:
        If tau_ent trajectory is the optimisation variable, wrapping the ODE
        in a Condor OptimizationProblem gives IPOPT-quality gradient descent
        over the entropic path — CasADi computes d(tau_ent)/d(lambda_s)
        exactly via adjoint method.

      Integration with DTL pipeline:
        EntropicTimeODE → wrapped via CondorPlugin → exposed as MCP tool
        "condor_tau_ent_ode" with scale_id="entropic_ode",
        outputs = {"tau_ent_trajectory", "delta_s_trajectory", "tau_ent_next",
                   "delta_s_i", "lambda_eff"}

    target_files:
      - multiphysics/integration/condor_tau_ent_ode.py   (new)

  # ── Phase 4: Condor OptimizationProblem for multi-domain τ_ent ──────────────
  phase4_tau_ent_optimisation:
    effort_weeks: 4-6
    risk: medium-high
    description: |
      Multi-domain entropic optimisation problem:

          class MultiDomainEntropicOpt(co.OptimizationProblem):
              # Decision variables: scale weights per bridge
              w_thermal = co.variable(lower_bound=0, upper_bound=1)
              w_cfd     = co.variable(lower_bound=0, upper_bound=1)
              w_em      = co.variable(lower_bound=0, upper_bound=1)

              # Embedded bridge models (Condor AlgebraicSystems)
              thermal = CondorMAPDLThermal(dose_gy=dose, ...)
              cfd     = CondorFluentCFD(flow_velocity_ms=v, ...)
              em      = CondorMaxwellEM(coil_current_a=I, ...)

              # Objective: minimise total entropic production
              objective = (
                  w_thermal * thermal.tau_ent_next +
                  w_cfd * cfd.tau_ent_next +
                  w_em  * em.tau_ent_next
              )

              # Constraint: weights sum to 1
              co.constraint(w_thermal + w_cfd + w_em == 1.0)

      CasADi/IPOPT solves the NLP; all Jacobians computed via AD on
      Condor's symbolic graph — no finite-difference perturbation needed.

      This is the DTL-level multi-physics τ_ent path optimiser.

    target_files:
      - multiphysics/integration/condor_tau_ent_multiopt.py  (new)

dtl_mapping:

  condor_to_dtl:
    FreeField_element:
      json_schema_type:  "number or array"
      dtl_role:          "input parameter"
      required:          "yes (no default) / optional (WithDefaultField)"

    AssignedField_element:
      json_schema_type:  "number or array"
      dtl_role:          "output_key in DTLContract"

    InitializedField_element:
      json_schema_type:  "number or array"
      dtl_role:          "output_key (solver variable)"

    BoundedAssignment_element:
      json_schema_type:  "number with minimum/maximum"
      dtl_role:          "QTMProfile invariant"

    lower_bound / upper_bound:
      dtl_role:          "invariant expression (e.g. 'temp_max_k >= temp_ambient_k')"

    Options.atol / Options.max_iter:
      dtl_role:          "backend_mode config (native = low atol, stub = no solve)"

    model.__doc__:
      dtl_role:          "MCPToolSchema.description"

    model.__name__ (snake_case):
      dtl_role:          "MCPToolSchema.name"

  tau_ent_mapping:
    required_output_keys: ["tau_ent_next", "delta_s_i", "lambda_eff"]
    source: |
      Condor model computes domain outputs (T_max, B_max, Re, ...).
      tau_ent_hook function (user-supplied) maps these to entropic keys:
        tau_ent_next = tau_ent_0 * exp(-lambda_rate * dt)
        delta_s_i    = tau_ent_0 - tau_ent_next
        lambda_eff   = domain_specific_decay_rate(outputs)

schema_auto_derivation: |
  CondorPlugin.derive_input_schema(model_class) algorithm:

    schema = {"type": "object", "properties": {}, "required": []}

    for field in model_class._meta.input_fields:         # FreeField, WithDefaultField
        for element in field.field:
            prop = {}
            if element.shape == () or element.size == 1:
                prop["type"] = "number"
            else:
                prop["type"] = "array"
                prop["items"] = {"type": "number"}
                prop["minItems"] = element.size
                prop["maxItems"] = element.size

            if hasattr(element, "lower_bound") and element.lower_bound is not None:
                prop["minimum"] = float(element.lower_bound)
            if hasattr(element, "upper_bound") and element.upper_bound is not None:
                prop["maximum"] = float(element.upper_bound)
            if hasattr(element, "default") and element.default is not None:
                prop["default"] = float(element.default)
            else:
                schema["required"].append(element.name)

            schema["properties"][element.name] = prop

    return schema

casadi_ad_for_dtl: |
  Condor provides Jacobians of any output with respect to any input
  via CasADi's symbolic differentiation — no user code required:

    dT_max/d(dose_gy)           → thermal sensitivity
    dB_max/d(coil_current_a)    → EM sensitivity
    d(tau_ent_next)/d(inputs)   → entropic gradient

  These can be surfaced via a CondorPlugin.jacobian(**kwargs) method
  returning a dict of gradient dicts — useful for:
    - DTL gradient-based diagnostics
    - Optimisation warm-starts
    - Uncertainty propagation

comparison_with_current_bridges:
  current_pyansys_analytical:
    jacobians:   "manual (not computed)"
    warm_start:  "none"
    constraints: "assert-based post-hoc"
    schema:      "handwritten DTLContract"
    solver:      "closed-form formula"

  condor_algebraic:
    jacobians:   "auto (CasADi AD)"
    warm_start:  "built-in (Newton successive call)"
    constraints: "algebraic residual, Condor-verified"
    schema:      "auto-derived from field metadata"
    solver:      "Newton rootfinder (configurable atol/max_iter)"

  verdict: |
    For simple analytical bridges (dose → temperature) the overhead of
    Condor is not justified. For coupled multi-variable systems where:
      - Jacobians are needed (sensitivity / optimisation)
      - Warm-starting matters (parameter sweeps)
      - Constraints must be verified algebraically (not just asserted)
    Condor's AlgebraicSystem is strictly better than hand-coded formulas.

    Phase 1 adapter has no overhead cost: existing bridges stay unchanged.
    Phases 2-4 progressively replace analytical stubs with Condor models
    as those bridges grow in complexity.

build_requirements:
  - python>=3.9
  - pip install condor-framework
  - (casadi is installed automatically as a dependency)
  - No C/Fortran compilation required

notes:
  - Lead: NASA Ames Research Center (Aeronautics)
  - JOSS publication: doi:10.21105/joss.08859
  - Design explicitly supports external solver wrappers → natural fit for
    wrapping OpenFOAM, Geant4, MEEP bridges as Condor ExternalSolverWrappers
  - CasADi dependency shared with several CAT/EPT optimisation workflows
  - NOSA-1.3 is OSI-compatible; can be used in MIT-licensed projects with
    attribution (US Govt retains 3rd-party beneficiary rights, no cost)
  - ExternalSolverWrapper pattern mirrors existing DTL plugin make_plugin()
    wrapping approach — conceptual alignment is very high
  - Datoviz (Vulkan viz, Python) is an alternative for field rendering;
    Condor is the complement on the solver/modeling side
