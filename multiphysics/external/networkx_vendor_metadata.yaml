name: networkx
upstream_url: https://github.com/networkx/networkx.git
upstream_ref: main
pip_package: networkx                  # pure Python — pip install networkx
imported_at_utc: 2026-03-09T00:00:00Z
import_method: pip                     # installed in Python environment
role: graph_topology_analysis          # spectral entropy → tau_ent coupling
license: BSD 3-Clause
version_stable: "3.6.1"               # installed version
stars: ~16000
language: Python 3 (pure)
key_dependencies:
  - numpy                              # eigenvalue computation for spectral analysis
  - scipy (optional)                   # sparse eigensolvers for large graphs
  - matplotlib (optional)              # visualization

overview: |
  NetworkX is the standard Python library for graph/network analysis.
  Used in CAT/EPT for graph topology → entropic time coupling:

  Von Neumann spectral entropy of the normalized graph Laplacian:
    H_VN = -Σ (λ_i / N) · log(λ_i / N + ε)   for λ_i ∈ spec(L_norm)

  This provides the dimensionless entropy_norm ∈ [0, 1]:
    entropy_norm = H_VN / log(N)

  Entropic coupling to tau_ent framework:
    lambda_eff = lambda_rate · (1 + entropy_norm + 0.1 · λ₁_Fiedler)
    delta_s_i  = lambda_eff · dt · (1 + λ₁_Fiedler / λ_max)

  GUNNS topology bridge: NetworkX graph edge weights → GUNNS conductance_s:
    conductance_s   = Σ edge_weights / (N - 1)
    supply_pressure = Σ weighted_degree_centrality · 1000 Pa
    demand_flow     = 0.5 · conductance_s  (kg/s)
  When gunns_bridge=True, the graph topology drives a GUNNS admittance solve.

graph_models_supported:
  erdos_renyi:       "G(N,p) — random edge with probability p"
  barabasi_albert:   "Scale-free network (preferential attachment, m edges/node)"
  watts_strogatz:    "Small-world network (k nearest-neighbors, rewire prob p)"
  grid_2d:           "2D lattice grid (sqrt(N) × sqrt(N))"
  complete:          "K_N — fully connected (model_param ignored)"
  path:              "Linear chain P_N (model_param ignored)"

analysis_modes:
  spectral:    "Von Neumann entropy via normalized Laplacian spectrum + centrality"
  centrality:  "Betweenness, eigenvector, degree centrality + clustering + diameter"
  flow:        "Max-flow / min-cut between source_node and sink_node (nx.maximum_flow)"

architecture_summary:
  bridge: "multiphysics/integration/networkx_entropic_bridge.py"
  native_backend: "multiphysics/core/networkx_native_backend.py"
  ir_node: "NetworkXGraphNode in multiphysics/qf_qutip_dsl/ir.py"
  command_type: "CommandType.NETWORKX_GRAPH (NetworkXGraph)"
  registry_ids:
    - networkx_entropic_graph   # scale_id=graph_topology

dtl_integration_plan:

  # ── Phase 1: Bridge + native backend ──────────────────────────────────────
  phase1_bridge_native:
    effort_weeks: 1
    risk: low
    status: complete
    description: |
      DONE: multiphysics/integration/networkx_entropic_bridge.py
        - _build_graph(): 6 random graph models via nx.erdos_renyi_graph etc.
        - _spectral_analysis(): nx.normalized_laplacian_spectrum() → H_VN
        - _centrality_analysis(): betweenness, eigenvector, clustering, diameter
        - _flow_analysis(): nx.maximum_flow() for max-flow/min-cut
        - _compute_gunns_bridge_params(): edge weights → conductance_s, pressure, flow
        - run_networkx_entropic_graph(): gunns_bridge=True calls run_gunns_entropic_solve()
        - Entropic coupling: lambda_eff, delta_s_i from spectral entropy + Fiedler value

      DONE: multiphysics/core/networkx_native_backend.py
        - NativeNetworkXUnavailable exception
        - ENV_NATIVE_PROVIDER = "CATEPT_NETWORKX_NATIVE_PROVIDER"
        - ENV_NATIVE_MOCK = "CATEPT_NETWORKX_NATIVE_MOCK"
        - _detect_networkx_provider(): "networkx" (installed v3.6.1), "mock", or "none"
        - run_networkx_native_graph(): delegates to bridge or analytical mock
        - Mock analytical approximation: H_VN ≈ H(p) · log(N) · 0.5 for ER graph

  # ── Phase 2: Registry + validator + tests ─────────────────────────────────
  phase2_registry_validator_tests:
    effort_weeks: 1
    risk: low
    status: complete
    description: |
      DONE: multiphysics/integration/registry.py
        - networkx_entropic_graph (scale_id=graph_topology, ir_op=NETWORKX_GRAPH)

      DONE: tools/multiphysics/validate_networkx_native_strict.py
      DONE: multiphysics/tests/test_validate_networkx_native_strict.py (6+ tests)
      DONE: multiphysics/qf_qutip_dsl/examples/networkx_native_strict_sample_target.json

  # ── Phase 3: Advanced graph algorithms ─────────────────────────────────────
  phase3_advanced_algorithms:
    effort_weeks: 2-3
    risk: low
    description: |
      Community detection:
        - Louvain: nx.community.louvain_communities() → modularity → entropy_mod
        - Label propagation: nx.community.label_propagation_communities()
      Spectral embedding:
        - nx.spectral_layout() → node positions in R² for visualization
        - Diffusion maps: L^k for multi-scale spectral analysis
      Robustness analysis:
        - Percolation threshold: iterative edge removal → giant component size
        - Node removal attack: targeted (high-degree) vs random

    target_files:
      - multiphysics/integration/networkx_community_bridge.py  (new)
      - multiphysics/integration/networkx_robustness_bridge.py (new)

  # ── Phase 4: Temporal graph evolution ──────────────────────────────────────
  phase4_temporal_graphs:
    effort_weeks: 3-4
    risk: medium
    description: |
      Time-evolving graphs: snapshot sequence → ΔH_VN/Δt (spectral entropy rate)
      Direct tau_ent ODE: d(tau_ent)/dt = lambda_rate · H_VN(G(t))
      Integration with Trick: Trick ODE step → NetworkX graph snapshot update

    target_files:
      - multiphysics/integration/networkx_temporal_bridge.py  (new)

dtl_mapping:
  networkx_to_dtl:
    H_VN:                    { dtl_role: "entropic action density", ir_key: "spectral_entropy" }
    entropy_norm:            { dtl_role: "normalized entropy ∈ [0,1]", formula: "H_VN / log(N)" }
    algebraic_connectivity:  { dtl_role: "Fiedler value λ₁", ir_key: "algebraic_connectivity" }
    spectral_radius:         { dtl_role: "largest eigenvalue ρ(L)", ir_key: "spectral_radius" }
    tau_ent_next:            { formula: "tau_ent_0 + lambda_eff * dt" }
    delta_s_i:               { formula: "lambda_eff * dt * (1 + λ₁/ρ)" }
    lambda_eff:              { formula: "lambda_rate * (1 + entropy_norm + 0.1*λ₁)" }

integration_with_gunns: |
  NetworkX provides graph topology; GUNNS solves the nodal physics.
  Bridge chain:
    networkx_entropic_bridge._compute_gunns_bridge_params()
      → run_gunns_entropic_solve()  (when gunns_bridge=True)
  Edge weights → conductance_s; node degree → supply pressure.
  Physical interpretation: graph connectivity = network conductance field.

integration_with_trick: |
  Phase 4: Trick orbital dynamics → NetworkX temporal graph.
  Satellite constellation topology changes as satellites move;
  H_VN(G(t)) feeds back into Trick's delta_s_i accumulation.

notes:
  - NetworkX 3.6.1 is already installed in the Python environment
  - Pure Python — no compilation required, zero build overhead
  - The Von Neumann spectral entropy is used in quantum information theory as
    the graph analogue of quantum entropy (density matrix = ρ = L_norm / N)
  - Algebraic connectivity (Fiedler value) = robustness of network connectivity
  - GUNNS bridge provides physical grounding: topology → conductance → dissipation → tau_ent
