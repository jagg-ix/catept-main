name: trame
upstream_url: https://github.com/Kitware/trame.git
upstream_ref: master
pip_package: trame
pip_extras:
  - trame-vtk           # VTK rendering backend
  - trame-vuetify       # Material Design UI components
  - trame-matplotlib    # matplotlib chart embedding
imported_at_utc: 2026-03-08T00:00:00Z
import_method: external_clone
role: pyansys_ui
catept_usage:
  - Web-based interactive viewer for PyVista 3D simulation results
  - Browser dashboard for real-time tau_ent field evolution
  - Embeds PyVista BackgroundPlotter in a web app (no Qt needed)
  - Notebook rendering for pyvista plots in JupyterLab
pyansys_integration:
  - PyMAPDL: pyvista.trame renders .result mesh in browser
  - PyFluent: ansys-tools-visualization-interface uses trame backend
  - PyAEDT: field plots can be streamed to trame web app
example_usage: |
  import pyvista as pv
  from trame.app import get_server
  from trame.ui.vuetify3 import SinglePageLayout
  from trame.widgets import vtk as trame_vtk

  server = get_server()
  state, ctrl = server.state, server.controller

  plotter = pv.Plotter()
  plotter.add_mesh(pv.Sphere(), color='orange')

  with SinglePageLayout(server) as layout:
      with layout.content:
          with trame_vtk.VtkRemoteView(plotter.ren_win):
              pass

  server.start()
notes:
  - Kitware's reactive web framework; same org as VTK and ParaView.
  - Used as the default web backend for pyvista >= 0.38.
  - Enables simulation dashboards accessible from any browser on the local network.
  - Works entirely without ANSYS licenses.
