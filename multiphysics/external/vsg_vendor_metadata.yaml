name: VulkanSceneGraph
upstream_url: https://github.com/vsg-dev/VulkanSceneGraph.git
upstream_ref: master
pip_package: null           # no Python package — C++17 library, CMake build only
binary_download: https://github.com/vsg-dev/VulkanSceneGraph/releases
imported_at_utc: 2026-03-08T00:00:00Z
import_method: external_clone
role: pyansys_ui            # viz layer — complements PyVista/trame for GPU-accelerated geometry
license: MIT
version_stable: v1.1.13     # Dec 2025
stars: 1700
language: C++17

catept_usage:
  - High-performance real-time rendering of Geant4 detector geometry (vsgXchange ← GDML/STL)
  - Particle track visualization via vsgPoints (LOD paging — billions of points)
  - MAPDL/OpenFOAM mesh rendering at interactive framerates (10x faster than VTK/OpenGL)
  - Composite multi-domain scenes: Geant4 + thermal + CFD + EM in one Vulkan pass
  - Headless off-screen Vulkan render → PNG for viz_server endpoints (replaces PyVista scenes)
  - Scalar field volume rendering via vsgExamples "vsgvolume" (prototype — requires custom shader)
  - Transfer function UIs via vsgImGui (clipping planes, isosurface controls)

ecosystem:
  vsgPoints:   https://github.com/vsg-dev/vsgPoints          # point cloud LOD paging
  vsgXchange:  https://github.com/vsg-dev/vsgXchange          # model/image format bridge
  vsgImGui:    https://github.com/vsg-dev/vsgImGui            # UI integration
  vsgQt:       https://github.com/vsg-dev/vsgQt               # Qt desktop window
  vsgExamples: https://github.com/vsg-dev/vsgExamples         # vsgvolume starting point

python_bindings: none       # no vsgPy or SWIG/pybind11 wrappers exist as of 2026-03
python_bridge_strategy: |
  Option A (recommended near-term): C++ VSG headless server with HTTP/gRPC API.
    Python viz_server.py calls subprocess or gRPC → C++ process renders → returns PNG.
    Mirrors existing PyVista REST API contract (POST /api/geant4-trajectory → PNG base64).
  Option B (medium-term): pybind11 thin wrapper around vsg::Viewer + vsg::Node.
    Bind Node/Data/Visitor; leave shader pipeline in C++.
  Option C (long-term): WebGPU bridge via wgpu-native (Rust/C); share GPU memory with sim.

build_requirements:
  - CMake >= 3.7
  - Vulkan SDK >= 1.1.70  (https://vulkan.lunarg.com/)
  - C++17 compiler (clang >= 14, gcc >= 11, MSVC 2022)
  - Optional: glslang (shader compilation), spirv-tools
  macOS:
    - MoltenVK (Vulkan on Metal) — bundled with Vulkan SDK for macOS
    - Xcode 14+
  Linux:
    - libvulkan-dev, mesa-vulkan-drivers or NVIDIA/AMD driver
    - Headless: virtual framebuffer not required (Vulkan runs without display)

build_example: |
  git clone https://github.com/vsg-dev/VulkanSceneGraph.git multiphysics/external/VulkanSceneGraph
  cd multiphysics/external/VulkanSceneGraph
  cmake -B build -DVSG_FLOAT_IMAGES=1 -DCMAKE_BUILD_TYPE=Release
  cmake --build build --parallel 8
  cmake --install build --prefix $HOME/.local

catept_integration_plan:
  phase1_geometry_server:
    effort_weeks: 2-3
    risk: low
    description: |
      C++ vsg_render_server binary:
        - Accepts JSON payload (geometry_path, camera_pos, width, height)
        - Loads GDML/STL/VTK via vsgXchange
        - Renders off-screen via headless Vulkan
        - Returns PNG bytes over stdout / HTTP
      webapp/py/viz_server/server.py gains a new backend_mode="vsg" that
      spawns the binary and falls back to PyVista if VSG not available.
    target_files:
      - multiphysics/external/VulkanSceneGraph/        (source)
      - tools/vsg/vsg_render_server.cpp                (C++ server)
      - webapp/py/viz_server/vsg_backend.py             (Python caller)

  phase2_volume_fields:
    effort_weeks: 4-6
    risk: medium
    description: |
      Port vsgExamples/vsgvolume into a proper vsgVolume library:
        - 3D texture loader for NumPy float32 grids (dose, tau_ent, temperature, B_mag)
        - GLSL transfer function (1D RGBA LUT sampled by scalar value)
        - Depth-correct compositing with geometry (dose phantom + beam track)
      Replaces: build_geant4_scene() / build_mapdl_thermal_scene() in field_viz.py
                for use cases where rendering latency > 200 ms with PyVista.

  phase3_vector_fields:
    effort_weeks: 3-4
    risk: medium
    description: |
      Custom glyph shader for arrow/streamline rendering:
        - B-field vectors (Maxwell), velocity (Fluent), vorticity (NS investigation)
        - GPU instancing for large vector datasets (Geant4 step directions)
      Potential reuse: Datoviz shaders (MIT licensed, Vulkan-based, scientific viz focus)

  phase4_realtime:
    effort_weeks: 8-12
    risk: high
    description: |
      Eliminate Python→PNG→base64 round-trip entirely:
        - Direct GPU-resident field data updated each simulation step
        - VSG rendering in background thread; Python sim in main thread
        - WebSocket push of delta-compressed frame diffs to browser
      Requires: gRPC bidirectional stream between Python sim and C++ VSG server

comparison_with_pyvista:
  geometry_rendering:     VSG wins (Vulkan — 10x faster traversal, lower CPU overhead)
  scalar_field_volumes:   PyVista wins (mature vtkVolumeRayCastMapper, 1 pip install)
  python_integration:     PyVista wins (native API, zero build step)
  real_time_performance:  VSG wins (sub-frame latency, GPU-explicit)
  scientific_abstractions:PyVista wins (contouring, slicing, streamlines out-of-box)
  deployment_complexity:  PyVista wins (pip install pyvista)
  off_screen_headless:    Both capable (Vulkan headless vs pyvista OFF_SCREEN=True)

verdict: |
  VSG is the right long-term investment for geometry-heavy and real-time scenarios.
  Near-term strategy: hybrid deployment.
    - PyVista handles field volumes (dose, τ_ent, temperature) — matures now, ships immediately
    - VSG handles high-poly geometry (Geant4 detector, MAPDL FEM mesh) — phase 1 in 2-3 weeks
    - Router in viz_server/server.py selects backend per scene type:
        if scene in ("geant4_geometry", "mapdl_mesh"): use vsg_backend
        else:                                           use pyvista (current)
  This approach retains all existing functionality while unlocking VSG performance gains
  incrementally, without blocking current visualization work.

notes:
  - Lead developer: Robert Osfield (original OpenSceneGraph creator)
  - VSG achieves 10x faster scene graph traversal vs OSG (design goal)
  - vsgPoints demo: 10 billion points with LOD paging at 60 fps
  - conda-forge binary planned (not yet available as of 2026-03)
  - Datoviz (https://github.com/datoviz/datoviz) is an alternative Vulkan scientific viz
    library with Python bindings — may be easier to integrate short-term
  - WebGPU (browser native Vulkan/Metal/D3D12) path: could replace Three.js in webapp
    for direct GPU field rendering without viz_server PNG round-trip
