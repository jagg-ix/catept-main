name: gmsh
upstream_url: https://gitlab.onelab.info/gmsh/gmsh.git
upstream_ref: main
pip_package: gmsh
pip_extras: []
binary_download: https://gmsh.info/#Download   # full GUI binary (FLTK-based)
imported_at_utc: 2026-03-08T00:00:00Z
import_method: external_clone
role: pyansys_ui
catept_usage:
  - CAD geometry creation and mesh generation for FEA/CFD domains
  - Generate .msh files consumed by OpenFOAM (via gmshToFoam), FEniCSx, MAPDL
  - Interactive GUI for geometry inspection and mesh quality assessment
  - Parametric geometry scripting (.geo files) for dose phantom design
  - Exports to VTK (→ PyVista), STL (→ Geant4 GDML), Nastran (→ MAPDL)
pyansys_integration:
  - MAPDL: gmsh .msh → PyMAPDL mesh import (mapdl.input, CDREAD)
  - OpenFOAM: gmsh → gmshToFoam conversion for CFD mesh
  - FEniCSx: meshio converts gmsh .msh → XDMF for dolfinx
  - Geant4: gmsh STL export → GDML geometry for particle transport
example_usage: |
  import gmsh

  gmsh.initialize()
  gmsh.model.add('phantom')

  # 5 cm water sphere (dose phantom)
  gmsh.model.occ.addSphere(0, 0, 0, 0.05)
  gmsh.model.occ.synchronize()

  gmsh.option.setNumber('Mesh.CharacteristicLengthMax', 0.005)
  gmsh.model.mesh.generate(3)
  gmsh.write('phantom.msh')

  # Launch interactive GUI
  # gmsh.fltk.run()

  gmsh.finalize()
gui_type: FLTK (desktop), also scriptable headless
notes:
  - pip install gmsh gives the Python API only (headless).
  - Full GUI binary required for interactive mesh editing.
  - meshio (pip install meshio) bridges gmsh .msh to all other formats.
  - Core tool in the open-source FEA/CFD geometry pipeline.
