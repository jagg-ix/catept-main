name: pyfluent
upstream_url: https://github.com/ansys/pyfluent.git
upstream_ref: main
pip_package: ansys-fluent-core
imported_at_utc: 2026-03-08T00:00:00Z
import_method: external_clone
catept_bridge: multiphysics/integration/pyansys_entropic_bridge.py
catept_bridge_function: run_pyansys_fluent_cfd
catept_registry_id: pyansys_fluent_cfd_entropic
catept_ir_node: PyAnsysFluentCFDNode
catept_scale: cfd_thermal_hydraulics
catept_ir_op: PyAnsysFluentCFD
validator: tools/multiphysics/validate_pyansys_fluent_native_strict.py
backend_modes:
  - stub
  - analytical
  - native
  - native_strict
env_vars:
  - CATEPT_PYANSYS_FLUENT_HOST   # default: 127.0.0.1
  - CATEPT_PYANSYS_FLUENT_PORT   # default: 50051
  - CATEPT_PYANSYS_NATIVE_MOCK   # set to "1" to force fallback
  - CATEPT_PYANSYS_NATIVE_TIMEOUT
interop_keys:
  - geant4       # coolant Q_removed → Geant4 shielding geometry
  - opentopas    # flow velocity → scattering medium update
  - qutip        # thermal phonon density
  - mapdl        # outlet_temperature_k ← T_max from MAPDL solve
  - pynucastro   # coolant activation cross-sections
physics_coupling: >
  MAPDL T_max_k → Fluent coolant inlet_temperature_k → outlet_temperature_k,
  heat_removal_w, pressure_drop_pa → EM Maxwell thermal derating.
notes:
  - CAT/EPT CFD thermal-hydraulics backend for reactor, HVAC, and beam-dump cooling workflows.
  - PyFluent communicates with ANSYS Fluent via gRPC (requires Fluent license + server).
  - Stub and analytical modes work without any ANSYS installation.
  - Coolant library covers water, helium, sodium, lead-bismuth, oil, air.
  - Apply pyansys_catept.patch for any local upstream modifications.
