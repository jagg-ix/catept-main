name: pyvistaqt
upstream_url: https://github.com/pyvista/pyvistaqt.git
upstream_ref: main
pip_package: pyvistaqt
pip_extras:
  - PyQt5    # or PyQt6 / PySide6
imported_at_utc: 2026-03-08T00:00:00Z
import_method: external_clone
role: pyansys_ui
catept_usage:
  - Non-blocking desktop Qt window for real-time field visualization during simulation
  - BackgroundPlotter: mesh updates while Python continues running bridge solves
  - Side-by-side multi-window layout for T_max, B_field, tau_ent fields
  - Integrates with GalaxyEngine (Raylib/ImGui) workflow as a complementary Qt desktop tool
pyansys_integration:
  - PyMAPDL: mapdl.result visualized via pyvistaqt.BackgroundPlotter
  - PyFluent: velocity/temperature contours updated in real-time during solve
  - PyAEDT: B-field magnitude overlay updated per iteration
example_usage: |
  import pyvistaqt
  import pyvista as pv
  from multiphysics.integration.pyansys_entropic_bridge import run_pyansys_mapdl_thermal

  plotter = pyvistaqt.BackgroundPlotter(title='MAPDL Thermal — CAT/EPT')
  mesh = pv.Sphere(radius=0.05)
  actor = plotter.add_mesh(mesh, scalars=[293.15], cmap='hot', clim=[290, 400])

  for dose in [0.5, 1.0, 2.0, 5.0]:
      p = run_pyansys_mapdl_thermal(
          dose_gy=dose, material='water', geometry_cm=5.0,
          temperature_ambient_k=293.15, lambda_rate=0.0,
          tau_ent_0=0.0, dt=1.0, backend_mode='opensource',
      )
      mesh['T_K'] = p['temperature_max_k']
      plotter.update_scalars(mesh['T_K'], mesh=mesh)
      plotter.update()
notes:
  - Provides BackgroundPlotter — a Qt window that runs in a background thread.
  - Complements GalaxyEngine (Raylib) for workstation-class 3D desktop UI.
  - Works entirely without ANSYS licenses.
