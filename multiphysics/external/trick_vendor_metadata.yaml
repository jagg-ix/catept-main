name: trick
upstream_url: https://github.com/nasa/trick.git
upstream_ref: master
pip_package: null                # C++/Python; no pip package — source build required
imported_at_utc: 2026-03-09T00:00:00Z
import_method: external_clone
role: mission_simulation          # spacecraft GNC and multi-body ODE integration
license: NASA Open Source Agreement v1.3 (NOSA-1.3)
version_stable: "19.6.0"         # latest release (2024)
stars: ~900
language: C++17 / Python 3 / SWIG

overview: |
  NASA/JSC Trick Simulation Environment.
  Full-stack mission simulation framework used for ISS, Orion, Gateway, and
  Artemis. Provides:
    - S_define declarative job scheduling (sim-object + rate groups)
    - Multi-rate integration engine: RK4, Euler, RK2, RK38, ABM4
    - Variable Server: TCP socket (port 7000) for real-time telemetry
    - ICG + SWIG Python bindings for all C++ sim objects
    - DR (Data Recording) groups for binary/CSV output
    - Trick View GUI for real-time plotting

  Key capability for CAT/EPT: Trick integrates the exact ODEs that govern
  spacecraft GNC, attitude dynamics, and astrodynamics — the same domains
  where entropic proper-time τ_ent is physically meaningful as a measure of
  trajectory divergence (Lyapunov exponent proxy).

  Entropic coupling:
    lyapunov_proxy = |ΔE_orbital| / |E_orbital_0|  (energy drift ratio)
    lambda_eff     = lambda_rate · (1 + lyapunov_proxy + 0.001·F_drag)
    delta_s_i      = lambda_eff · T_sim   (total simulation duration)

architecture_summary:
  sim_components:
    S_define:        "Declarative simulation configuration (sim-objects, job rates)"
    SimObject:       "C++ class containing models + job declarations"
    JobClass:        "Scheduled function: scheduled, initialization, integration, shutdown"
    TrickIntegrator: "Multi-rate ODE integrator (RK4, Euler, RK2, RK38, ABM4)"
    VariableServer:  "TCP socket port 7000 — variable register/poll API"
    DRGroup:         "Data recording group — binary or CSV output"
    ICG:             "Interface Control Generator — auto Python bindings from C++ headers"
    SWIG:            "Alternative Python binding generator"

  physics_models:
    OrbitalMechanics: "2-body, J2, atmospheric drag, SRP, N-body (SPICE)"
    AttitudeDynamics: "Euler equations, quaternion propagation, rate gyro model"
    GNC:              "PID + LQR controllers, thruster logic, star tracker model"
    FlexibleBody:     "Modal analysis for solar panels, antennae"
    ThermalControl:   "Radiator, heater, MLI thermal models"

  variable_server_protocol:
    connect:   "TCP to host:7000"
    register:  "trick.var_add('dyn.ball.pos[0]')"
    poll:      "trick.var_send()"
    response:  "tab-separated values or JSON (Trick 19.4+)"

dtl_integration_plan:

  # ── Phase 1: Bridge + native backend ──────────────────────────────────────
  phase1_bridge_native:
    effort_weeks: 1-2
    risk: low
    status: complete
    description: |
      DONE: multiphysics/integration/trick_entropic_bridge.py
        - run_trick_entropic_solve() with RK4 orbital mechanics stub
        - _rk4_step(): point_mass + J2 + exponential-atmosphere drag
        - _euler_step(): simpler fallback integrator
        - Lyapunov-proxy tau_ent coupling
        - QTM profile: scale_id=mission_simulation, ir_op=TRICK_SIM
        - Interop hints: gunns (thermal load), openfoam (velocity), condor, mrmustard

      DONE: multiphysics/core/trick_native_backend.py
        - NativeTrickUnavailable exception
        - ENV_NATIVE_RUNNER = "CATEPT_TRICK_NATIVE_RUNNER"
        - ENV_VARIABLE_SERVER = "CATEPT_TRICK_VARIABLE_SERVER" (host:port)
        - Subprocess runner contract: op=trick_sim_step JSON stdin/stdout
        - Variable Server TCP contract: JSON query/response via socket
        - Mock mode: CATEPT_TRICK_NATIVE_MOCK=1
        - trick_native_capabilities() discovery (runner + variable_server)

  # ── Phase 2: Registry + validator + tests ─────────────────────────────────
  phase2_registry_validator_tests:
    effort_weeks: 1
    risk: low
    status: complete
    description: |
      DONE: multiphysics/integration/registry.py
        - trick_entropic_solve (scale_id=mission_simulation)
        - trick_gnc_sim        (scale_id=gnc_ode)

      DONE: tools/multiphysics/validate_trick_native_strict.py
      DONE: multiphysics/tests/test_validate_trick_native_strict.py (7 tests)

  # ── Phase 3: Trick S_define integration ────────────────────────────────────
  phase3_sdefine:
    effort_weeks: 3-4
    risk: medium
    status: complete
    description: |
      DONE: multiphysics/external/trick_sim/SIM_catept/models/catept_sim_object.hh
        CateptSimObject C++ header for Trick SimObject:
          - CATEPT_MAX_NODES=64 — Trick-accessible nodal potential/flow arrays
          - CateptNetworkState POD struct — all keys accessible via Variable Server
          - Jobs: default_data(), initialize(), step(dt), shutdown()
          - Runner dispatch: runner_path != "python" → gunns_catept_runner subprocess
          - Fallback: analytical ladder-network stub (no binary required)

      DONE: multiphysics/external/trick_sim/SIM_catept/models/catept_sim_object.cpp
        Full C++17 implementation:
          - _solve_analytical(): Gauss-Seidel on tridiagonal admittance matrix
          - _solve_via_runner(): popen() to gunns_catept_runner, parses JSON response
          - Entropic coupling: lambda_eff, delta_s_i, tau_ent accumulated across steps
          - Fallback from runner to analytical on popen failure

      DONE: multiphysics/external/trick_sim/SIM_catept/S_define
        Trick S_define defining CateptTrickSim SimObject:
          - Scheduled jobs: default_data, initialization, dynamic 0.1s, shutdown
          - create_connections() stub for multi-sim wiring
          - Variable Server: catept_sim.catept.tau_ent, .delta_s_i, .lambda_eff, .net.*

      DONE: multiphysics/external/trick_sim/SIM_catept/input.py
        Trick Python input file:
          - 5-node fluid network, 2.5 S conductance, 202650 Pa supply
          - Binary data recording (0.1s): tau_ent, delta_s_i, lambda_eff, dissipation
          - ASCII data recording (0.5s): tau_ent, delta_s_i, lambda_eff
          - Diagnostic print at t=9.9s
          - Variable Server on default port 7000
          - runner_path configuration comment (Phase 3 C++ runner)

    target_files:
      - multiphysics/external/trick_sim/SIM_catept/models/catept_sim_object.hh  ✓
      - multiphysics/external/trick_sim/SIM_catept/models/catept_sim_object.cpp  ✓
      - multiphysics/external/trick_sim/SIM_catept/S_define                     ✓
      - multiphysics/external/trick_sim/SIM_catept/input.py                     ✓

  # ── Phase 4: Trick + GUNNS coupled simulation ──────────────────────────────
  phase4_trick_gunns:
    status: complete
    description: |
      DONE: multiphysics/integration/gunns_trick_coupled_bridge.py
        GUNNSTrickCoupledBridge — sequential GUNNS→Trick coupling:
          - Stage 1: GUNNS HybridNetwork (thermal-hydraulic) → thermal_power_w, mass_flow_kg_s
          - Coupling: drag_coeff_eff = drag_base * (1 + thermal_drag_scale * P_thermal / m_flow)
          - Stage 2: Trick GNC ODE (RK4/RK2/Euler) with thermal-modulated drag
          - Multi-domain: tau_ent_total = tau_ent_0 + delta_s_i_gunns + delta_s_i_trick
          - Back-channel hint: Trick altitude → GUNNS atmospheric density (future bidirectional)
          - Interop sections: gunns_to_trick, trick_to_gunns_hint, trick_variable_server, openfoam

      DONE: GUNNSTrickCoupledNode in ir.py (28 fields)
      DONE: CommandType.GUNNS_TRICK_COUPLED + _build_gunns_trick_coupled in compat.py
      DONE: compile_gunns_trick_coupled in compiler.py
      DONE: gunns_trick_coupled_sim IntegrationSpec in registry.py (scale_id: multi_domain_spacecraft)
      DONE: tools/multiphysics/validate_gunns_trick_coupled_sim.py
        Multi-domain invariant validation: delta_s_i == delta_s_i_gunns + delta_s_i_trick
        Interop section validation: gunns_to_trick, trick_to_gunns_hint, trick_variable_server
      DONE: multiphysics/tests/test_validate_gunns_trick_coupled_sim.py (8 tests)
        default params, j2 gravity, direct bridge call, additive invariant,
        thermal drag coupling monotonicity, command pipeline, interop hints, Euler integrator
      DONE: multiphysics/qf_qutip_dsl/examples/gunns_trick_coupled_spacecraft_target.json
        4-node water radiator, LEO ISS orbit, J2 gravity, RK4, 1-orbit sim

    target_files:
      - multiphysics/integration/gunns_trick_coupled_bridge.py           ✓
      - multiphysics/qf_qutip_dsl/ir.py (GUNNSTrickCoupledNode)          ✓
      - multiphysics/qf_qutip_dsl/compat.py (GUNNS_TRICK_COUPLED)        ✓
      - multiphysics/qf_qutip_dsl/compiler.py (compile_gunns_trick_coupled) ✓
      - multiphysics/integration/registry.py (gunns_trick_coupled_sim)   ✓
      - tools/multiphysics/validate_gunns_trick_coupled_sim.py           ✓
      - multiphysics/tests/test_validate_gunns_trick_coupled_sim.py      ✓
      - multiphysics/qf_qutip_dsl/examples/gunns_trick_coupled_spacecraft_target.json ✓

dtl_mapping:
  trick_to_dtl:
    dyn.state.pos[0:2]:      { dtl_role: "initial_position_km[3]" }
    dyn.state.vel[0:2]:      { dtl_role: "initial_velocity_kms[3]" }
    dyn.mass:                { dtl_role: "mass_kg" }
    env.gravity_model:       { dtl_role: "gravity_mode" }
    aero.drag_coeff:         { dtl_role: "drag_coeff" }
    integ.delta_t:           { dtl_role: "sim_dt" }
    tau_ent:                 { formula: "tau_ent_0 + lambda_eff * T_sim" }
    delta_s_i:               { formula: "lambda_eff * T_sim" }
    lambda_eff:              { formula: "lambda_rate * (1 + lyapunov_proxy + 0.001*F_drag)" }
    lyapunov_proxy:          { formula: "abs(ΔE_orb) / abs(E_orb_0)" }

  variable_server_to_dtl:
    connection:   "CATEPT_TRICK_VARIABLE_SERVER=host:7000"
    op:           "trick_sim_step"
    returns:      [tau_ent_next, delta_s_i, lambda_eff, final_position_km, final_velocity_kms, lyapunov_proxy]

invariants:
  energy_monotone_policy:   "orbital energy change bounded by |ΔE| ≤ |E₀| * lyapunov_threshold"
  gnc_convergence_policy:   "lyapunov_proxy < 0.05 for stable trajectories"

integration_with_gunns: |
  Trick directly schedules GUNNS solve jobs in S_define.
  Natural flow: Trick computes orbital state → passes temps to GUNNS thermal
  → GUNNS returns heat flows → Trick uses for radiator model.
  CAT/EPT bridge wraps both: tau_ent_orbital + tau_ent_thermal.

integration_with_condor: |
  ODE trajectory can be expressed as Condor ODESystem:
    dτ/dt = -λ·τ, ẋ = f(x, u) (spacecraft dynamics)
  Condor OptimizationProblem then minimizes total entropic cost over
  the mission trajectory — adjoint method for dτ_final/dλ(t).

build_requirements:
  - git clone https://github.com/nasa/trick.git multiphysics/external/trick
  - cd multiphysics/external/trick && ./configure && make -j8
  - export TRICK_HOME=$(pwd)
  - trick-CP SIM_catept/S_define  # compile the sim

notes:
  - Lead: NASA/JSC Engineering Directorate
  - Used in: ISS, Orion, Gateway, Artemis GNC simulations
  - Variable Server protocol stable since Trick 10.x
  - Trick 17+ supports JSON Variable Server responses (CATEPT_TRICK_VARIABLE_SERVER)
  - NOSA-1.3 is OSI-compatible with MIT-licensed projects
  - ICG-generated bindings allow Python scripts to drive Trick sims via input.py
  - trick_native_backend.py covers both subprocess runner AND TCP Variable Server paths
