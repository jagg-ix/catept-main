# PySCF interoperability demo (optional)
# Exports a Hamiltonian timeline in the repo's standard (t, tau_ent, lambda) contract.

out_dir: PAPER_TABLES/ADVANCED/PYSCF_INTEROP

time:
  t_max_s: 1.0e-12
  n_steps: 50

system:
  atom: "H 0 0 0; H 0 0 0.74"
  basis: "sto-3g"

lambda_model:
  phi_profile_csv: ""
  lambda_const_s_inv: 1.0e12

spacetime:
  enabled: false
  efe_gain: 0.0
