# QuTiP CAT/EPT complex-action run (optional)

out_dir: PAPER_TABLES/ADVANCED/QUTIP_COMPLEX_ACTION

time:
  t_max_s: 1.0e-12
  n_steps: 400

system:
  # Two-level toy model used for deterministic validation.
  omega_hz: 1.0e12
  # Dissipative channel J = (I - sigma_z)/2

lambda_model:
  # If a phi profile CSV is available (e.g. from Phase 6.4 tensor profiles),
  # we derive lambda(t) = dphi/dt. Otherwise we fall back to lambda_const.
  phi_profile_csv: ""
  auto_discover_tensor_profile: true
  lambda_const_s_inv: 1.0e12

mode:
  # "t" integrates in coordinate time; "tau" integrates in entropic time.
  integrate_in: t

gates:
  enforce_schema: true
  enforce_second_law: true
  enforce_causality_bound: false
  l_min_m: 1.0e-6
  c_m_s: 299792458.0

spacetime:
  # Optional coupling layer (EinsteinPy / complex-EFE residual) applied as a scalar
  # modifier to lambda(t): lambda_eff = lambda_base * redshift * (1 + efe_gain*residual).
  enabled: false
  efe_gain: 0.0
