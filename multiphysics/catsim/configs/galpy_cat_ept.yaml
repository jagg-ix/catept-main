# galpy CAT/EPT orbit demo configuration
# This demo is OPTIONAL and does not affect the Tirole pipeline.

run:
  out_dir: PAPER_TABLES/ADVANCED/GALPY_CAT_EPT
  dt_s: 1.0e5
  n_steps: 400

units:
  ro_kpc: 8.0
  vo_kms: 220.0

initial_state:
  R_ro: 1.0
  vR_vo: 0.0
  vT_vo: 1.0
  phi_rad: 0.0

cat_ept:
  enabled: true
  # baseline constant lambda used only if no phi-profile is available.
  lambda_const_s_inv: 0.0
  kappa_drag: 1.0  # gamma = kappa_drag * lambda(t)
  # Default to BOTH so the CAT/EPT demo can be driven by Paper3 phi(t)
  # profiles (grad-phi) while still allowing a drag channel.
  force_mode: both  # drag | grad_phi | both
  grad_phi:
    # Enable by setting kappa_grad_phi != 0 and force_mode to grad_phi/both
    kappa_grad_phi: 1.0
    phi_radial_scale_ro: 1.0
    # Optional: wire Paper3 tensor profiles (Phase 6.4) into galpy
    # Provide a CSV with columns t_s (or tau_ent_s) and phi/phi_amp/phi_t.
    # Example: PAPER_TABLES/PHASE6_4/TENSOR_PROFILE/phi_profile.csv
    # Leave empty to auto-discover a Phase 6.4 tensor profile under:
    #   PAPER_TABLES/ADVANCED/TENSOR_OBSERVABLES/profiles/
    phi_profile_csv: ""
    # If true, we gate that the enabled run matches baseline (equilibrium limit).
    equilibrium_expect: false

# Gates
# - invariance: if cat_ept.enabled=false then results should match baseline
# - laws: lambda >=0 and lambda <= c/l_min
# - schema: timeline has t_s, tau_ent_s, lambda_s_inv

gates:
  tol_invariance_abs: 1.0e-10
  l_min_m: 1.0
  c_m_s: 299792458.0
