# Spacetime coupler demo configuration
# Enables Complex-EFE residual model selection.
spacetime:
  enabled: true
  efe_gain: 0.0  # set >0 to let residual modulate lambda_eff
  efe:
    model: paper3_v1
    metric_kind: minkowski
    phi_expr: 0
    lambda_mode: trace_adjusted
    kappa: 1
    eval_strategy: numeric_lambdify
    x0: 0.0
    y0: 0.0
    z0: 0.0
